name: Build

on:
  schedule:
    - cron: '0 8 * * *'
  push:
    paths:
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch API data and embed in index.html
        run: |
          API='https://api.root-corporation.com'
          HASH='RqWhZb7hdJnt9a+y+zr+Q7Ojgi4JPAyoHzcWBJZa8bk='

          echo "Fetching API data..."

          API_DATA=$(jq -n \
            --argjson ed25519_pub "$(curl -sX GET "$API/v1/ed25519.pub")" \
            --argjson public_server "$(curl -sX GET "$API/v1/public/server")" \
            --argjson public_legal "$(curl -sX GET "$API/v1/public/legal")" \
            --argjson public_rule "$(curl -sX GET "$API/v1/public/rule")" \
            --argjson public_room "$(curl -sX GET "$API/v1/public/room")" \
            --argjson room_server "$(curl -sX GET "$API/v1/public/server" -H "X-Room-Id: $HASH")" \
            --argjson room_rule "$(curl -sX GET "$API/v1/public/rule" -H "X-Room-Id: $HASH")" \
            --argjson room_legal "$(curl -sX GET "$API/v1/public/legal" -H "X-Room-Id: $HASH")" \
            --argjson room_product "$(curl -sX POST "$API/v1/public/product" -H "X-Room-Id: $HASH")" \
            --argjson room_bonus "$(curl -sX POST "$API/v1/public/bonus" -H "X-Room-Id: $HASH")" \
            '{
              ed25519_pub: $ed25519_pub,
              public: {
                server: $public_server,
                legal: $public_legal,
                rule: $public_rule,
                room: $public_room
              },
              room: {
                server: $room_server,
                rule: $room_rule,
                legal: $room_legal,
                product: $room_product,
                bonus: $room_bonus
              }
            }')

          echo "API data fetched successfully"

          # Create embedded script
          EMBEDDED_SCRIPT="<script>
          window.EMBEDDED_API_DATA = $API_DATA;
          </script>"

          # Remove existing embedded data and insert new one
          sed -i '/<script>\s*window\.EMBEDDED_API_DATA/,/<\/script>/d' index.html
          sed -i "s|</head>|$EMBEDDED_SCRIPT\n</head>|" index.html

          echo "Embedded data injected into index.html"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update embedded API data"
            git push
          fi
